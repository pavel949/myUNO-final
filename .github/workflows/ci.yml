name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: myuno_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Wait for PostgreSQL (before build)
        run: |
          max_attempts=10
          attempt=0
          until [ $attempt -ge $max_attempts ]; do
            if pg_isready -h localhost -p 5432 -U test; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... (attempt $((attempt + 1))/$max_attempts)"
            sleep 1
            ((attempt++))
          done

      - name: Create test database (before build)
        env:
          PGPASSWORD: test
        run: |
          psql -h localhost -U test -c "CREATE DATABASE myuno_test;" 2>/dev/null || true

      - name: Build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/myuno_test
          DATABASE_URL_TEST: postgresql://test:test@localhost:5432/myuno_test
          NEXTAUTH_SECRET: test-secret
          NEXTAUTH_URL: http://localhost:3000
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: npm run build

      - name: Wait for PostgreSQL (with retry)
        run: |
          max_attempts=30
          attempt=0
          until [ $attempt -ge $max_attempts ]; do
            if pg_isready -h localhost -p 5432 -U test; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... (attempt $((attempt + 1))/$max_attempts)"
            sleep 2
            ((attempt++))
          done
          if [ $attempt -ge $max_attempts ]; then
            echo "PostgreSQL failed to start"
            exit 1
          fi

      - name: Create test database
        env:
          PGPASSWORD: test
        run: |
          psql -h localhost -U test -c "CREATE DATABASE myuno_test;" 2>/dev/null || true
          psql -h localhost -U test -d myuno_test -c "CREATE EXTENSION IF NOT EXISTS citext;" 2>/dev/null || true

      - name: Generate and apply migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/myuno_test
        run: |
          npx prisma migrate deploy --skip-generate
        timeout-minutes: 5

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/myuno_test
          DATABASE_URL_TEST: postgresql://test:test@localhost:5432/myuno_test
          NEXTAUTH_SECRET: test-secret
          NEXTAUTH_URL: http://localhost:3000
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: |
          set -o pipefail
          npx vitest run 2>&1 | tee test-output.log
        timeout-minutes: 10
